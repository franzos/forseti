name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TAILWIND_VERSION: v4.1.16

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # create the GitHub release and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            tailwind: tailwindcss-linux-x64
            tailwind_sha256: 09e6876a63ceb09ccd7e5867e3dbb2b2dc65c3a2f2e2fe210d68ea3bc0432050
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            tailwind: tailwindcss-linux-arm64
            tailwind_sha256: 967eb434f4d6a1c0dfda106decc646cb742e04d745aa484726023cdd46ba8eda

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: System deps (libpq for diesel postgres)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Build CSS (Tailwind)
        run: |
          mkdir -p .bin
          curl -fsSL -o .bin/tailwindcss \
            "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/${{ matrix.tailwind }}"
          echo "${{ matrix.tailwind_sha256 }}  .bin/tailwindcss" | sha256sum -c -
          chmod +x .bin/tailwindcss
          make css

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          name="forseti-${{ matrix.target }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/forseti" "$name/"
          cp -r static "$name/"
          cp config.example.toml "$name/"
          tar -czf "$name.tar.gz" "$name"
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            forseti-${{ matrix.target }}.tar.gz
            forseti-${{ matrix.target }}.tar.gz.sha256

      # Hand this leg's tarball digest to the provenance job. `.sha256` is already
      # a `sha256sum`-format line, exactly what the SLSA generator's subjects want.
      - name: Upload hash for provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: provenance-hash-${{ matrix.target }}
          path: forseti-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  # Matrix jobs can't aggregate outputs, so each build leg uploads its sha256
  # line and this job concatenates them into the base64 subjects the generator
  # signs over.
  provenance-subjects:
    name: collect provenance subjects
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - name: Download per-target hashes
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: provenance-hash-*
          merge-multiple: true
          path: hashes
      - name: Base64-encode combined subjects
        id: hashes
        run: echo "hashes=$(cat hashes/*.sha256 | base64 -w0)" >> "$GITHUB_OUTPUT"

  # Keyless (Sigstore/OIDC) SLSA build provenance covering both tarballs, attached
  # to the release. Referenced by TAG, not a SHA: the generator verifies its own
  # ref to establish the trusted-builder identity, so a pinned commit breaks it.
  provenance:
    name: SLSA provenance
    needs: provenance-subjects
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write # keyless Sigstore signing via OIDC
      contents: write # attach the .intoto.jsonl to the release
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.provenance-subjects.outputs.hashes }}
      upload-assets: true

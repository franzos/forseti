name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TAILWIND_VERSION: v4.1.16

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # create the GitHub release and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            tailwind: tailwindcss-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            tailwind: tailwindcss-linux-arm64

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: System deps (libpq for diesel postgres)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Build CSS (Tailwind)
        run: |
          mkdir -p .bin
          curl -fsSL -o .bin/tailwindcss \
            "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/${{ matrix.tailwind }}"
          chmod +x .bin/tailwindcss
          make css

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          name="forseti-${{ matrix.target }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/forseti" "$name/"
          cp -r static "$name/"
          cp config.example.toml "$name/"
          tar -czf "$name.tar.gz" "$name"
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            forseti-${{ matrix.target }}.tar.gz
            forseti-${{ matrix.target }}.tar.gz.sha256

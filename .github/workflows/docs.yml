name: docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least-privilege for the build; the deploy job needs pages + id-token.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; don't cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: v0.5.4
  MDBOOK_SHA256: 3f28de05dafca9d0f2eab99c662116b0e37b89b1d96a08f8f430b9eeae958cd7

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.bin"
          curl -fsSL -o mdbook.tar.gz \
            "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${MDBOOK_SHA256}  mdbook.tar.gz" | sha256sum -c -
          tar -xzf mdbook.tar.gz -C "$HOME/.bin"
          echo "$HOME/.bin" >> "$GITHUB_PATH"

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build
        run: mdbook build docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

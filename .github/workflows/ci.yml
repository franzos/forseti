name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Mirrors `make check` (cargo check + clippy -D warnings). No fmt gate —
      # the repo doesn't enforce rustfmt and the tree isn't fmt-clean; add a
      # `cargo fmt --check` step once a one-time `cargo fmt` pass has landed.
      - run: make check

  audit:
    name: cargo-deny advisories
    runs-on: ubuntu-latest
    # Warn, don't block: advisories surface as PR annotations + in the log, but
    # an unfixed transitive CVE never stalls an unrelated PR. The GitHub Security
    # tab / Dependabot drive remediation. Flip this off to make CVEs gate merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  integration:
    name: rust integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # The host-side test client reaches Hydra at its issuer host
      # (host.containers.internal:4444, see tests/integration/common.rs). A dev
      # box resolves that via /etc/hosts; the runner doesn't, so map it here.
      # Kratos -> host webhooks use host.docker.internal, handled inside the
      # container by the compose `extra_hosts: host-gateway` mapping.
      - name: Map Hydra issuer host to loopback
        run: echo "127.0.0.1 host.containers.internal" | sudo tee -a /etc/hosts

      # Clean slate every run: stack-up brings the playground up and blocks
      # until Kratos + Hydra report ready.
      - name: Bring up Ory playground
        run: make stack-up COMPOSE="docker compose"

      # Plant a deterministic admin (password + TOTP) so the admin-gated tests
      # run. Exports FORSETI_ADMIN_TEST_* to $GITHUB_ENV for later steps; the
      # seeded email matches config.ci.toml's [admin].allowed_emails.
      - name: Seed admin identity
        run: make seed-admin COMPOSE="docker compose"

      - name: Build Forseti
        run: cargo build --locked --bin forseti

      - name: Start Forseti and wait for health
        run: |
          FORSETI_CONFIG_PATH=config.ci.toml ./target/debug/forseti > forseti.log 2>&1 &
          echo $! > forseti.pid
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:3000/healthz >/dev/null 2>&1; then
              echo "Forseti healthy"; exit 0
            fi
            sleep 2
          done
          echo "Forseti failed to become healthy:"; cat forseti.log; exit 1

      - name: Run integration tests
        run: make test-integration

      - name: Forseti logs
        if: always()
        run: cat forseti.log || true

      - name: Tear down playground
        if: always()
        run: make stack-down COMPOSE="docker compose"

  e2e-licensed:
    name: playwright (licensed + saml)
    runs-on: ubuntu-latest
    # Skipped unless the issuer signing key is present as a repo secret. Forks
    # and PRs from accounts without the secret see this job as "skipped", never
    # red. The blob is minted in CI from FORSETI_LICENSE_ISSUER_KEY (base64 of
    # the 32-byte Ed25519 private half whose public half is committed at
    # src/commercial/pubkey.bin) — nothing signed is ever committed.
    if: ${{ secrets.FORSETI_LICENSE_ISSUER_KEY != '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Map Hydra issuer host to loopback
        run: echo "127.0.0.1 host.containers.internal" | sudo tee -a /etc/hosts

      # Licensed SAML suite needs the Jackson + mock-saml bridge, gated behind
      # the compose `saml` profile. podman-compose ignores COMPOSE_PROFILES, so
      # the Makefile passes it as a flag (works for docker compose too).
      - name: Bring up Ory playground (with SAML profile)
        run: make stack-up COMPOSE="docker compose" COMPOSE_PROFILE_FLAGS="--profile saml"

      - name: Seed admin identity
        run: make seed-admin COMPOSE="docker compose"

      # Mint a fresh, lifetime test license signed by the issuer key held in
      # the secret. We check out the sibling issuer repo (it holds the minter
      # crate `make license-fixtures` already shells out to), write the
      # decoded key to keys/private.bin, and run the exact same `issue`
      # invocation — sans `--expires` so the blob never ages out mid-suite.
      # Output lands at tests/fixtures/license/active.blob, the path
      # `make e2e-licensed` expects (and which .gitignore keeps out of git).
      - name: Check out license issuer
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.FORSETI_LICENSE_ISSUER_REPO }}
          token: ${{ secrets.FORSETI_LICENSE_ISSUER_TOKEN }}
          path: license-issuer

      - name: Mint test license from issuer key
        env:
          FORSETI_LICENSE_ISSUER_KEY: ${{ secrets.FORSETI_LICENSE_ISSUER_KEY }}
        run: |
          set -euo pipefail
          mkdir -p license-issuer/keys tests/fixtures/license
          # The secret carries base64(32 raw key bytes). Decode straight into
          # the path the issuer CLI defaults to (--private-key keys/private.bin).
          printf '%s' "$FORSETI_LICENSE_ISSUER_KEY" | base64 -d > license-issuer/keys/private.bin
          chmod 600 license-issuer/keys/private.bin
          test "$(wc -c < license-issuer/keys/private.bin)" -eq 32 \
            || { echo "decoded issuer key is not 32 bytes — wrong secret encoding"; exit 1; }
          # Mirrors `make license-fixtures`' active.blob, minus --expires
          # (lifetime). Tier label is cosmetic; the orgs + saml + linux_auth
          # features are what the licensed bucket gates on (linux_auth gates the
          # profile-hosts + host-scoping specs; without it they pass vacuously
          # via the omitted-section path).
          ( cd license-issuer && cargo run --release --quiet -- \
              issue --tier business --feature orgs --feature saml --feature linux_auth \
              --customer "CI SAML e2e" --email "e2e@example.com" ) \
            > tests/fixtures/license/active.blob
          # Wipe the key as soon as the blob is signed.
          rm -f license-issuer/keys/private.bin
          test -s tests/fixtures/license/active.blob || { echo "empty blob"; exit 1; }

      - name: Build Forseti
        run: cargo build --locked --bin forseti

      # First boot: lets Forseti create forseti.db and run the embedded diesel
      # migrations (which CREATE the forseti_license table + the migration
      # bookkeeping). We must NOT hand-create that table ourselves — diesel
      # would then try to re-run the initial migration and fail on the
      # existing table. So: migrate via a real boot, stop, seed, re-boot.
      - name: Boot once to create DB + run migrations
        run: |
          FORSETI_CONFIG_PATH=config.ci.toml ./target/debug/forseti > forseti.boot.log 2>&1 &
          pid=$!
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:3000/healthz >/dev/null 2>&1; then
              kill "$pid"; wait "$pid" 2>/dev/null || true; exit 0
            fi
            sleep 2
          done
          echo "first boot failed to become healthy:"; cat forseti.boot.log
          kill "$pid" 2>/dev/null || true; exit 1

      # Activate by seeding the singleton row into the now-migrated DB.
      # `commercial::store::load` re-derives everything from the verified blob
      # at boot, so only the `blob` column must be real; the denormalised
      # columns are operator-inspection cache and carry placeholders. A
      # lifetime blob → expires_at NULL, which `make e2e-licensed`'s precheck
      # reads as "active". INSERT OR REPLACE keeps the singleton invariant.
      #
      # The blob is base64 text (no special shell characters), but we strip
      # newlines and escape any single-quotes by doubling them before
      # embedding in the SQL literal — making the insertion robust even if
      # the blob format ever changes.
      - name: Activate license (seed singleton row)
        run: |
          set -euo pipefail
          BLOB="$(tr -d '\n' < tests/fixtures/license/active.blob | sed "s/'/''/g")"
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sqlite3 forseti.db <<SQL
          INSERT OR REPLACE INTO forseti_license
            (id, blob, license_id, customer, email, tier, issued_at, expires_at,
             features, activated_at, verified_at)
            VALUES ('singleton', '${BLOB}', 'ci', 'CI SAML e2e', 'e2e@example.com',
             'business', '${NOW}', NULL, '["orgs","saml"]', '${NOW}', '${NOW}');
          SQL

      # Second boot: store::load reads the seeded row, verifies the blob
      # against the committed pubkey, and the gated surfaces (/sso, /admin/saml)
      # come up licensed.
      - name: Start Forseti and wait for health
        run: |
          FORSETI_CONFIG_PATH=config.ci.toml ./target/debug/forseti > forseti.log 2>&1 &
          echo $! > forseti.pid
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:3000/healthz >/dev/null 2>&1; then
              echo "Forseti healthy"; exit 0
            fi
            sleep 2
          done
          echo "Forseti failed to become healthy:"; cat forseti.log; exit 1

      # Confirm the blob verified at boot before the long suite runs. A bad
      # key (pubkey rotated out of sync with the secret) logs a warning and
      # falls back to Unlicensed — catch that here, not 4 specs deep.
      # Forseti logs via tracing JSON: the message field is "license: active"
      # (store.rs:log_status). grep -F matches the literal substring in both
      # plain and JSON log formats without caring about surrounding punctuation.
      - name: Verify license is live
        run: |
          grep -qF 'license: active' forseti.log \
            || { echo "license did not activate at boot — relevant log lines:"; \
                 grep -iE 'license|error|warn' forseti.log || true; exit 1; }

      - name: Run Playwright (licensed + saml)
        run: make e2e-licensed

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-licensed
          path: tests/e2e/playwright-report/
          if-no-files-found: ignore

      - name: Forseti logs
        if: always()
        run: cat forseti.log || true

      - name: Tear down playground
        if: always()
        run: make stack-down COMPOSE="docker compose"

  e2e:
    name: playwright (unlicensed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Map Hydra issuer host to loopback
        run: echo "127.0.0.1 host.containers.internal" | sudo tee -a /etc/hosts

      - name: Bring up Ory playground
        run: make stack-up COMPOSE="docker compose"

      - name: Seed admin identity
        run: make seed-admin COMPOSE="docker compose"

      - name: Build Forseti
        run: cargo build --locked --bin forseti

      - name: Start Forseti and wait for health
        run: |
          FORSETI_CONFIG_PATH=config.ci.toml ./target/debug/forseti > forseti.log 2>&1 &
          echo $! > forseti.pid
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:3000/healthz >/dev/null 2>&1; then
              echo "Forseti healthy"; exit 0
            fi
            sleep 2
          done
          echo "Forseti failed to become healthy:"; cat forseti.log; exit 1

      # `make e2e` drives the unlicensed Playwright bucket inside the Microsoft
      # Playwright image. It reads FORSETI_ADMIN_TEST_* (exported by the seed
      # step) to drive the AAL2 admin sign-in.
      - name: Run Playwright (unlicensed)
        run: make e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          if-no-files-found: ignore

      - name: Forseti logs
        if: always()
        run: cat forseti.log || true

      - name: Tear down playground
        if: always()
        run: make stack-down COMPOSE="docker compose"

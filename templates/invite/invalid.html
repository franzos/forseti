{% extends "base.html" %}

{% block title %}Invite unavailable &middot; {{ chrome.brand.name }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto flex flex-col gap-stack-lg py-margin-desktop">
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-stack-lg flex flex-col gap-stack-md">
        <h1 class="font-headline-lg text-headline-lg text-on-surface">Invite unavailable</h1>
        <p class="font-body-md text-on-surface-variant">{{ message }}.</p>
        <p class="font-body-sm text-on-surface-variant">Contact the person who invited you to request a fresh link.</p>
        <a href="/" class="text-primary font-label-md">&larr; Back to dashboard</a>
    </div>
</div>
{% endblock %}

# src = "." roots the book at docs/ so the existing guides and READMEs keep
# their paths; files not listed in SUMMARY.md (e.g. dev/) are never published.
[book]
title = "Forseti"
description = "Self-service UI and OAuth2 login/consent bridge for Ory Kratos + Ory Hydra."
authors = ["Franz Geffke"]
language = "en"
src = "."

[build]
build-dir = "book"

[output.html]
git-repository-url = "https://github.com/franzos/forseti"
edit-url-template = "https://github.com/franzos/forseti/edit/master/docs/{path}"
# Project-pages path (franzos.github.io/forseti/). Set to "/" for a root-domain deploy.
site-url = "/forseti/"

[output.html.search]
enable = true
